name: Static Analysis
on:
  pull_request:
  push:
  workflow_call:

jobs:
  check_spotless:
    uses: ./.github/workflows/reusable_spotless_check.yml
    permissions:
      contents: read
  check_pmd:
    uses: ./.github/workflows/reusable_pmd.yml
    permissions:
      contents: read
  call-designite:
    uses: ./.github/workflows/reusavle_designite_java.yml
    secrets:
      PAT: ${{ secrets.PAT }}