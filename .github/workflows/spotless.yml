name: Apply Spotless
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - '**'

jobs:
  apply_spotless:
    name: Apply Spotless
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make Grade executable
        run: chmod +x ./gradlew
      - name: Test with Gradle
        run: ./gradlew spotlessApply