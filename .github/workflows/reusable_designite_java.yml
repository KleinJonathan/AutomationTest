name: DesigniteJava code quality

on:
  workflow_call:
    # Alle Grenzen sind optional. -1 (Default) = wird nicht geprueft.
    secrets:
      D_KEY:
        required: false
    inputs:
      max_smells:
        description: "Grenze fuer die Gesamtzahl aller Smells."
        type: number
        default: -1
        required: false
      max_architecture:
        description: "Grenze fuer Architecture Smells."
        type: number
        default: -1
        required: false
      max_design:
        description: "Grenze fuer Design Smells."
        type: number
        default: -1
        required: false
      max_implementation:
        description: "Grenze fuer Implementation Smells."
        type: number
        default: -1
        required: false
      max_testability:
        description: "Grenze fuer Testability Smells."
        type: number
        default: -1
        required: false
      max_test:
        description: "Grenze fuer Test Smells."
        type: number
        default: -1
        required: false

jobs:
  DesigniteJava:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Download DesigniteJava
        run: wget -q "https://www.designite-tools.com/assets/DesigniteJava.jar"
      # -i analysiert den GESAMTEN Quellordner (nicht nur den Commit-Diff wie -ci).
      # Pfad muss absolut sein, sonst NullPointerException (getParentFile()).
      - name: Analyze full source with DesigniteJava
        run: java -jar DesigniteJava.jar -i "$GITHUB_WORKSPACE/src" -o build/reports/designite-report
      # Rendert die CSVs als Step Summary und wertet das Quality Gate aus (Exit 1).
      - name: Report & Quality Gate
        if: always()
        env:
          MAX_SMELLS: ${{ inputs.max_smells }}
          MAX_ARCHITECTURE: ${{ inputs.max_architecture }}
          MAX_DESIGN: ${{ inputs.max_design }}
          MAX_IMPLEMENTATION: ${{ inputs.max_implementation }}
          MAX_TESTABILITY: ${{ inputs.max_testability }}
          MAX_TEST: ${{ inputs.max_test }}
        run: python3 .github/scripts/designite_report.py build/reports/designite-report
      - name: Upload Designite Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: designite-report
          path: build/reports/designite-report
          retention-days: 7
