name: DesigniteJava code quality

on:
  workflow_call:
    # Alle Grenzen sind optional. -1 (Default) = wird nicht geprueft.
    inputs:
      max_smells:
        description: "Grenze fuer die Gesamtzahl aller Smells."
        type: number
        default: -1
        required: false
      max_architecture:
        description: "Grenze fuer Architecture Smells."
        type: number
        default: -1
        required: false
      max_design:
        description: "Grenze fuer Design Smells."
        type: number
        default: -1
        required: false
      max_implementation:
        description: "Grenze fuer Implementation Smells."
        type: number
        default: -1
        required: false
      max_testability:
        description: "Grenze fuer Testability Smells."
        type: number
        default: -1
        required: false
      max_test:
        description: "Grenze fuer Test Smells."
        type: number
        default: -1
        required: false

jobs:
  DesigniteJava:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: DesigniteJava_action
        uses: DesigniteTools/DJAction@v2.0.0
        with:
            PAT: ${{ secrets.PAT }}
            D_KEY: ${{ secrets.D_KEY }}
